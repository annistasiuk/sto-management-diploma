{% load static %}

<!DOCTYPE html>
<html lang="uk">

<head>
    <meta charset="UTF-8">

    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <title>Вхід | СТО Менеджер</title>

    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700;800;900&display=swap"
          rel="stylesheet">

    <link rel="stylesheet"
          href="{% static 'css/style.css' %}">
</head>

<body class="login-page">

    <div class="login-wrapper">

        <div class="login-card">

            <div class="logo-box">
                СТО
            </div>

            <h1>
                Вхід у систему
            </h1>

            <p>
                Авторизація персоналу СТО
            </p>

            {% if error %}
                <div class="form-errors">
                    {{ error }}
                </div>
            {% endif %}

            <form method="post">

                {% csrf_token %}

                <div class="form-group">

                    <label for="username">
                        Логін
                    </label>

                    <input
                        type="text"
                        id="username"
                        name="username"
                        placeholder="Введіть логін"
                        autocomplete="username"
                        required
                    >

                </div>

                <div class="form-group">

                    <label for="password">
                        Пароль
                    </label>

                    <input
                        type="password"
                        id="password"
                        name="password"
                        placeholder="Введіть пароль"
                        autocomplete="current-password"
                        required
                    >

                </div>

                <button type="submit"
                        class="btn-primary login-btn">

                    Увійти

                </button>

            </form>

        </div>

    </div>

</body>

</html>
